name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint-tsc:
    name: Type-check (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: tsc --noEmit (must be 0 errors)
        run: npx tsc --noEmit

  test:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    needs: lint-tsc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: vitest run
        run: npm run test

  live:
    name: Live provider tests (gated)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' && secrets.NVIDIA_API_KEY != '' }}
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      VITE_NVIDIA_BASE_URL: ${{ secrets.VITE_NVIDIA_BASE_URL }}
      VITE_NVIDIA_MODEL: ${{ secrets.VITE_NVIDIA_MODEL }}
      ENABLE_RAG: '1'
      RUN_LIVE_RAG_TESTS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: vitest run (live, gated)
        run: npm run test
